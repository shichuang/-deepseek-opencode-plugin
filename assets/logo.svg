<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Background circle -->
  <circle cx="200" cy="200" r="195" fill="#0f1117" stroke="#00a86b" stroke-width="6"/>

  <!-- DS monogram in DeepSeek green -->
  <text x="85" y="270" font-family="system-ui,-apple-system,sans-serif" font-size="220" font-weight="900" fill="#00a86b" letter-spacing="-12">DS</text>

  <!-- Tagline below -->
  <text x="200" y="350" font-family="system-ui,-apple-system,sans-serif" font-size="28" font-weight="600" fill="#00a86b" text-anchor="middle" letter-spacing="4">OPENCODE</text>

  <!-- 8 dots representing Constitution articles (circle arc) -->
  <circle cx="200" cy="52" r="8" fill="#00a86b"/>
  <circle cx="276" cy="68" r="7" fill="#00a86b" opacity="0.9"/>
  <circle cx="334" cy="118" r="6" fill="#00a86b" opacity="0.8"/>
  <circle cx="355" cy="188" r="5" fill="#00a86b" opacity="0.7"/>
  <circle cx="334" cy="258" r="4" fill="#00a86b" opacity="0.6"/>
  <circle cx="276" cy="308" r="5" fill="#00a86b" opacity="0.7"/>
  <circle cx="200" cy="325" r="6" fill="#00a86b" opacity="0.8"/>
  <circle cx="124" cy="308" r="7" fill="#00a86b" opacity="0.9"/>

  <!-- V4 label -->
  <text x="330" y="85" font-family="monospace" font-size="16" fill="#00a86b" opacity="0.6">V4</text>
</svg>
